name = "RequestProject"
defaultTargets = ["DobbertinStep1", "DobbertinLego", "G"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.28.0"

# Minimal, self-contained MVP for the first step (1) ⟹ (2) of Dobbertin's
# Theorem 1.  Root module `DobbertinStep1` transitively imports its submodules.
[[lean_lib]]
name = "DobbertinStep1"
globs = ["DobbertinStep1", "DobbertinStep1.+"]

# Minimal "LEGO-block" rebuild of the same first step (1) ⟹ (2): the whole proof
# assembled from two primitive bricks (Frobenius `frob`, linearized loop `loop`)
# plus one telescope connective.  Root module `DobbertinLego`.
[[lean_lib]]
name = "DobbertinLego"
globs = ["DobbertinLego", "DobbertinLego.+"]

# Golfed mirror of `DobbertinLego` (incl. the category-theory layer): single-letter
# / Greek names and compressed proofs.  Root module `G`.
[[lean_lib]]
name = "G"
globs = ["G", "G.+"]

# The original exploratory sub-developments below use directory/module names that
# are not valid Lean module identifiers (spaces, hyphens), so they are not built
# as libraries here.  Their source files are retained unchanged in the tree.
#
# [[lean_lib]]
# name = "Equation1"
# globs = ["Equation1.+"]
