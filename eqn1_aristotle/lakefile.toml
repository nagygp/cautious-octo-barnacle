name = "RequestProject"
defaultTargets = ["Equation1", "KasamiPermutation03", "KasamiThm1", "KasamiPermutations01", "KasamiPermutations02"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.28.0"

[[lean_lib]]
name = "Equation1"
srcDir = "Equation1"
globs = ["Equation1", "Equation1.+", "Equation1ProofSpace"]

[[lean_lib]]
name = "KasamiPermutation03"
srcDir = "Kasami Permutation-03"
globs = ["KasamiPermutation", "KasamiPermutation.+"]

[[lean_lib]]
name = "KasamiThm1"
srcDir = "Kasami-Thm1-from-gadgets"
globs = ["Kasami", "Kasami.+"]

[[lean_lib]]
name = "KasamiPermutations01"
srcDir = "Kasami-permutations-01"
globs = ["KasamiPermutations", "KasamiPermutations.+"]

[[lean_lib]]
name = "KasamiPermutations02"
srcDir = "KasamiPermutations-02"
globs = ["KasamiPermutations2", "KasamiPermutations2.+"]
