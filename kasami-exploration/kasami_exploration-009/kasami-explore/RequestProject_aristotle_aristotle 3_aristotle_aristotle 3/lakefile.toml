name = "RequestProject"
defaultTargets = ["Theorem23", "Theorem3", "Kasami_Final_Theorem", "Main"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.28.0"

[[lean_lib]]
name = "Theorem23"
globs = ["Theorem23.+"]

[[lean_lib]]
name = "Theorem3"
globs = ["Theorem3.+"]

[[lean_lib]]
name = "Kasami_Final_Theorem"
globs = ["Kasami_Final_Theorem"]

[[lean_lib]]
name = "Main"
globs = ["Main"]

[[lean_lib]]
name = "KasamiConjecture"
globs = ["KasamiConjecture"]

[[lean_lib]]
name = "KasamiCharacters"
globs = ["KasamiCharacters"]

[[lean_lib]]
name = "KasamiFourier"
globs = ["KasamiFourier"]

[[lean_lib]]
name = "KasamiAB"
globs = ["KasamiAB"]
