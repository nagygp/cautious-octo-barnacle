name = "RequestProject"
defaultTargets = ["CodeTheoryCryptoEquiv", "ConjecturesMTupleTripleCount"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.28.0"

[[lean_lib]]
name = "CodeTheoryCryptoEquiv"
srcDir = "code-theory_crypto_equiv"
globs = ["CodeTheoryCryptoEquiv.+"]

[[lean_lib]]
name = "ConjecturesMTupleTripleCount"
srcDir = "conjectures-mtuple-triple_count"
globs = ["ConjecturesMTupleTripleCount.+"]
