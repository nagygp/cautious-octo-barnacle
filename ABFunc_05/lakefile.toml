name = "RequestProject"
defaultTargets = ["Bridge", "Candidates", "Category", "CodingTheory", "Conjectures", "Dynamics", "Foundation", "Spectral", "Tests"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.28.0"

[[lean_lib]]
name = "Bridge"
globs = ["Bridge.+"]

[[lean_lib]]
name = "Candidates"
globs = ["Candidates.+"]

[[lean_lib]]
name = "Category"
globs = ["Category.+"]

[[lean_lib]]
name = "CodingTheory"
globs = ["CodingTheory.+"]

[[lean_lib]]
name = "Conjectures"
globs = ["Conjectures.+"]

[[lean_lib]]
name = "Dynamics"
globs = ["Dynamics.+"]

[[lean_lib]]
name = "Foundation"
globs = ["Foundation.+"]

[[lean_lib]]
name = "Spectral"
globs = ["Spectral.+"]

[[lean_lib]]
name = "Tests"
globs = ["Tests.+"]
