name = "RequestProject"
defaultTargets = ["ABCategory", "CodingTheoryIsomorphism", "PNBooleanRelatives", "SporadicABFunc", "CategoryTheoryTests", "APNConjectures"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.28.0"

[[lean_lib]]
name = "ABCategory"
globs = ["ABCategory"]

[[lean_lib]]
name = "CodingTheoryIsomorphism"
globs = ["CodingTheoryIsomorphism"]

[[lean_lib]]
name = "PNBooleanRelatives"
globs = ["PNBooleanRelatives"]

[[lean_lib]]
name = "SporadicABFunc"
globs = ["SporadicABFunc"]

[[lean_lib]]
name = "HomotopySpectral"
globs = ["HomotopySpectral"]

[[lean_lib]]
name = "ABDiscoveryIntegration"
globs = ["ABDiscoveryIntegration"]

[[lean_lib]]
name = "CategoryTheoryTests"
globs = ["CategoryTheoryTests"]

[[lean_lib]]
name = "DualitySymmetry"
globs = ["DualitySymmetry"]

[[lean_lib]]
name = "APNConjectures"
globs = ["APNConjectures"]

[[lean_lib]]
name = "NewABConjectures"
globs = ["NewABConjectures"]

[[lean_lib]]
name = "NewAPNConjectures"
globs = ["NewAPNConjectures"]
